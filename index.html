  @keyframes pulse{ 0%,100%{opacity:0.35;} 50%{opacity:0.85;} }

  /* ---------- DESKTOP VIEW ---------- */
  .desktop-view{
    position:absolute; inset:0; z-index:6;
    opacity:0;
    pointer-events:none;
    transition:opacity .8s ease .15s;
  }
  .screen.unlocked .desktop-view{
    opacity:1; pointer-events:auto;
  }

  .desktop-logo{
    position:absolute;
    top:24px; left:50%;
    transform:translateX(-50%);
    width:clamp(90px, 9vw, 130px);
    filter:drop-shadow(0 0 18px rgba(200,30,46,0.3));
    opacity:0;
    animation:logoIn .6s ease .15s forwards;
  }
  .desktop-logo img{ width:100%; display:block; }
  @keyframes logoIn{ to{ opacity:1; } }

  .icons{
    position:absolute;
    top:32px; left:32px;
    display:flex; flex-direction:column;
    gap:30px;
  }

  .user{
    display:flex; flex-direction:column; align-items:center; gap:10px;
    width:104px;
    cursor:pointer;
    opacity:0;
    transform:translateY(-6px);
    animation:userIn .45s ease forwards;
  }
  .user:nth-child(1){ animation-delay:.3s; }
  .user:nth-child(2){ animation-delay:.4s; }
  .user:nth-child(3){ animation-delay:.5s; }
  .user:nth-child(4){ animation-delay:.6s; }
  @keyframes userIn{ to{ opacity:1; transform:translateY(0); } }

  .icon{
    width:72px; height:72px; border-radius:50%;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.5);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.45), 0 0 14px rgba(200,30,46,0.15);
    transition:transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease, border-color .3s ease;
  }
  .icon img{ width:100%; height:100%; object-fit:cover; display:block; }

  .user:hover .icon{
    transform:translateY(-3px) scale(1.06);
    border-color:rgba(255,255,255,0.85);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.5), 0 0 22px rgba(200,30,46,0.5);
  }

  .username{
    font-family:'Rajdhani',sans-serif;
    font-size:15.5px; font-weight:600; letter-spacing:1.5px;
    color:rgba(238,240,242,0.85);
    text-transform:lowercase;
    text-align:center;
    text-shadow:0 1px 4px rgba(0,0,0,0.8);
    transition:color .3s ease, text-shadow .3s ease;
  }
  .user:hover .username{ color:#fff; text-shadow:0 0 12px rgba(200,30,46,0.6); }

  /* ---------- TASKBAR ---------- */
  .taskbar{
    position:absolute; left:0; right:0; bottom:0; z-index:7;
    height:56px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px;
    background:rgba(10,10,12,0.55);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border-top:1px solid rgba(255,255,255,0.07);
    box-shadow:0 -8px 30px rgba(0,0,0,0.35);
    transform:translateY(100%);
    transition:transform .6s ease .2s;
  }
  .screen.unlocked .taskbar{ transform:translateY(0); }

  .taskbar-left{ display:flex; align-items:center; gap:10px; padding:6px 14px 6px 8px; border-radius:6px; cursor:pointer; transition:background .25s ease; }
  .taskbar-left:hover{ background:rgba(255,255,255,0.05); }

  .mini-logo{ width:24px; height:24px; }
  .mini-logo img{ width:100%; height:100%; object-fit:contain; }

  .start-text{
    font-family:'Rajdhani',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:3px; text-transform:uppercase; color:rgba(238,240,242,0.8);
  }

  .taskbar-right{ display:flex; align-items:center; gap:20px; }
  .sys-icon{ width:18px; height:18px; opacity:0.75; transition:opacity .25s ease; }
  .sys-icon:hover{ opacity:1; }

  .clock-block{ display:flex; flex-direction:column; align-items:flex-end; line-height:1.25; padding-left:14px; border-left:1px solid rgba(255,255,255,0.1); }
  .clock{ font-family:'Rajdhani',sans-serif; font-weight:600; font-size:14px; letter-spacing:1px; color:rgba(238,240,242,0.92); }
  .date{ font-family:'Inter',sans-serif; font-size:10.5px; letter-spacing:0.5px; color:rgba(238,240,242,0.5); }
</style>
</head>

<script>
  function updateClock(){
    const now=new Date();
    const h=now.getHours().toString().padStart(2,'0');
    const m=now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent=`${h}:${m}`;
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  }
  updateClock();
  setInterval(updateClock,30000);

  // Load avatar images trying multiple file extensions (png, jpg, jpeg, webp).
  // Drop your own picture into avatars/<name>.<ext> using any of these formats.
  const AVATAR_EXTENSIONS = ['png','jpg','jpeg','webp'];
  document.querySelectorAll('.avatar-img').forEach(img=>{
    const name = img.dataset.user;
    let i = 0;
    function tryNext(){
      if(i >= AVATAR_EXTENSIONS.length) return; // no file found, icon stays empty
      img.src = `avatars/${name}.${AVATAR_EXTENSIONS[i]}`;
      i++;
    }
    img.addEventListener('error', tryNext);
    tryNext();
  });

  const screen=document.getElementById('screen');
  const lockView=document.getElementById('lockView');
  lockView.addEventListener('click',()=>{
    screen.classList.add('unlocked');
  });

  document.querySelectorAll('.user').forEach(u=>{
    u.addEventListener('click',()=>{
      console.log('login as', u.dataset.name);
    });
  });
</script>
